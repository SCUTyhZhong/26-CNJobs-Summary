<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Job Navigator</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div id="inviteOverlay" class="overlay" aria-hidden="false">
      <div class="overlay-card">
        <h1>访问验证</h1>
        <p>输入邀请码后继续访问岗位导航。</p>
        <form id="inviteForm" class="invite-form">
          <input id="inviteInput" type="password" placeholder="请输入邀请码" autocomplete="off" required />
          <button type="submit">进入</button>
        </form>
        <p id="inviteError" class="hint error"></p>
      </div>
    </div>

    <div class="bg-gradient"></div>

    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Job Info Collector</p>
          <h1>三月校招实习岗位</h1>
          <p class="subtitle">数据源来自各大招聘官网，禁止商用</p>
        </div>
        <div class="hero-metrics">
          <div class="metric">
            <span class="label">当前状态</span>
            <strong id="loadStateText">准备中</strong>
          </div>
          <div class="metric">
            <span class="label">数据更新时间</span>
            <strong id="updatedAtText">-</strong>
          </div>
          <div class="metric">
            <span class="label">匹配岗位</span>
            <strong id="resultCountText">0</strong>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索岗位标题 / 职责 / 要求 / 加分项" />
        </div>

        <div class="filters-grid">
          <select id="filterCompany"><option value="">全部公司</option></select>
          <select id="filterProject"><option value="">全部项目</option></select>
          <select id="filterCategory"><option value="">全部类别</option></select>
          <select id="filterCity"><option value="">全部城市</option></select>
          <select id="sortBy">
            <option value="publish_time">按发布时间</option>
            <option value="relevance">按相关度</option>
          </select>
          <button id="clearFilters" type="button" class="ghost">清空条件</button>
        </div>

        <div class="toolbar-footer">
          <button id="overviewEntry" type="button" class="chip">数据概览（即将上线）</button>
          <span class="source-note">数据来源：聚合校招站点，点击卡片可跳转原始岗位。</span>
        </div>
      </section>

      <section class="status-panel">
        <p id="statusMessage">正在初始化...</p>
      </section>

      <section id="listContainer" class="card-list" aria-live="polite"></section>

      <section class="actions">
        <button id="loadMoreBtn" type="button">加载更多</button>
      </section>
    </main>

    <template id="jobCardTpl">
      <article class="job-card">
        <header>
          <h3 class="title"></h3>
          <a class="detail-link" target="_blank" rel="noreferrer noopener">查看详情</a>
        </header>
        <div class="meta-inline">
          <span class="meta-chip"><span class="meta-label">公司</span><span class="meta-value" data-field="company"></span></span>
          <span class="meta-chip"><span class="meta-label">项目</span><span class="meta-value" data-field="project"></span></span>
          <span class="meta-chip"><span class="meta-label">类别</span><span class="meta-value" data-field="category"></span></span>
          <span class="meta-chip"><span class="meta-label">城市</span><span class="meta-value" data-field="city"></span></span>
          <span class="meta-chip"><span class="meta-label">发布时间</span><span class="meta-value" data-field="publishTime"></span></span>
        </div>
        <div class="detail-sections">
          <section class="detail-block detail-block-primary">
            <h4>岗位职责</h4>
            <p data-field="responsibilities"></p>
          </section>
          <section class="detail-block detail-block-primary">
            <h4>岗位要求</h4>
            <p data-field="requirements"></p>
          </section>
          <section class="detail-block detail-block-full">
            <h4>加分项</h4>
            <p data-field="bonusPoints"></p>
          </section>
        </div>
      </article>
    </template>

    <script src="config/invite-codes.js"></script>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
